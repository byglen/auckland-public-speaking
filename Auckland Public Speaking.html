<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auckland Public Speaking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body, #root {
      width: 100%; height: 100%;
      background: #0b0b14;
      font-family: 'Outfit', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* Keyframe animations used by screen components */
    @keyframes nameFlick {
      from { opacity: 0.4; transform: translateY(6px); }
      to   { opacity: 1;   transform: translateY(0); }
    }

    @keyframes revealBounce {
      0%   { opacity: 0; transform: scale(0.55) translateY(24px); }
      65%  { opacity: 1; transform: scale(1.07) translateY(-6px); }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulseBig {
      0%, 100% { opacity: 1;   transform: scale(1); }
      50%       { opacity: 0.7; transform: scale(0.97); }
    }

    /* Wheel “currently under pointer” readout — short crossfade each slice change */
    @keyframes spinNameSwap {
      0% {
        opacity: 0;
        transform: translateY(0.2em) scale(0.97);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Draw screen — soft pulse on red “full speed” hold state */
    @keyframes spinHoldPulse {
      0%, 100% { opacity: 0.72; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.02); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a48; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Data must load before components -->
  <script src="data.js"></script>
  <script type="text/babel" src="wheel.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
