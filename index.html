<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auckland Public Speaking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body, #root {
      width: 100%; height: 100%;
      background: #0b0b14;
      font-family: 'Outfit', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* Keyframe animations used by screen components */
    @keyframes nameFlick {
      from { opacity: 0.4; transform: translateY(6px); }
      to   { opacity: 1;   transform: translateY(0); }
    }

    @keyframes revealBounce {
      0%   { opacity: 0; transform: scale(0.55) translateY(24px); }
      65%  { opacity: 1; transform: scale(1.07) translateY(-6px); }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulseBig {
      0%, 100% { opacity: 1;   transform: scale(1); }
      50%       { opacity: 0.7; transform: scale(0.97); }
    }

    @keyframes firstTimerChipPulse {
      0%   { box-shadow: 0 0 0 0 rgba(212,168,75,0); transform: scale(1); }
      40%  { box-shadow: 0 0 22px rgba(212,168,75,0.55); transform: scale(1.06); }
      100% { box-shadow: 0 0 0 0 rgba(212,168,75,0); transform: scale(1); }
    }

    @keyframes ledDigitPulse {
      0%, 100% { opacity: 1; filter: brightness(1); }
      48%      { opacity: 0.92; filter: brightness(0.94); }
      50%      { opacity: 0.88; filter: brightness(0.88); }
      52%      { opacity: 0.94; filter: brightness(0.96); }
    }

    /* Wheel “currently under pointer” readout — short crossfade each slice change */
    @keyframes spinNameSwap {
      0% {
        opacity: 0;
        transform: translateY(0.2em) scale(0.97);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Draw screen — soft pulse on red “full speed” hold state */
    @keyframes spinHoldPulse {
      0%, 100% { opacity: 0.72; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.02); }
    }

    /* Next Speaker reveal — warm glow + floating applause */
    @keyframes revealGlowPulse {
      0%, 100% { opacity: 0.7; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.05); }
    }

    @keyframes revealRingPulse {
      0%, 100% { opacity: 0.35; transform: scale(1); }
      50%       { opacity: 0.75; transform: scale(1.04); }
    }

    @keyframes applauseDrift0 {
      0%   { transform: translate(0, 48px) rotate(-10deg) scale(0.45); opacity: 0; }
      14%  { opacity: 0.95; }
      100% { transform: translate(-42px, -240px) rotate(16deg) scale(1.05); opacity: 0; }
    }

    @keyframes applauseDrift1 {
      0%   { transform: translate(0, 36px) rotate(8deg) scale(0.5); opacity: 0; }
      14%  { opacity: 0.9; }
      100% { transform: translate(52px, -280px) rotate(-22deg) scale(0.95); opacity: 0; }
    }

    @keyframes applauseDrift2 {
      0%   { transform: translate(0, 56px) rotate(0deg) scale(0.4); opacity: 0; }
      16%  { opacity: 0.88; }
      100% { transform: translate(-18px, -210px) rotate(28deg) scale(1.12); opacity: 0; }
    }

    @keyframes revealShimmer {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    @keyframes revealQuoteIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes yoloPulse {
      0%, 100% { opacity: 0.85; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.04); }
    }

    @keyframes yoloTeasePulse {
      0%, 100% { opacity: 0.45; transform: translateY(0); }
      50%       { opacity: 1;   transform: translateY(-3px); }
    }

    @keyframes yoloQuestionReveal {
      0%   { opacity: 0; transform: scale(0.9) translateY(22px); }
      55%  { opacity: 0.72; transform: scale(0.97) translateY(8px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes yoloCountPop {
      0%   { opacity: 0; transform: scale(0.72); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes yoloGoPop {
      0%   { opacity: 0; transform: scale(0.5); }
      70%  { opacity: 1; transform: scale(1.12); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes walkthroughHighlightPulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 4px rgba(212,168,75,0.22), 0 0 22px rgba(212,168,75,0.38); }
      50%       { opacity: 0.88; box-shadow: 0 0 0 8px rgba(212,168,75,0.1), 0 0 36px rgba(212,168,75,0.52); }
    }

    @keyframes walkthroughShake {
      10%, 90% { transform: translateX(-2px); }
      20%, 80% { transform: translateX(4px); }
      30%, 50%, 70% { transform: translateX(-8px); }
      40%, 60% { transform: translateX(8px); }
    }

    @keyframes walkthroughArrowNudge {
      0%, 100% { transform: translateX(0); }
      50%      { transform: translateX(7px); }
    }

    @keyframes walkthroughCoachGlow {
      0%, 100% { box-shadow: 0 24px 70px rgba(0,0,0,0.55), 0 0 0 1px rgba(212,168,75,0.45), 0 0 26px rgba(212,168,75,0.30); }
      50%      { box-shadow: 0 24px 70px rgba(0,0,0,0.6), 0 0 0 1px rgba(212,168,75,0.8), 0 0 46px rgba(212,168,75,0.58); }
    }

    @keyframes walkthroughCoachPop {
      0%   { transform: scale(0.94); }
      55%  { transform: scale(1.03); }
      100% { transform: scale(1); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a48; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Data must load before components -->
  <script src="data.js"></script>
  <script src="reveal-quotes.js"></script>
  <script src="jazz-loop.js"></script>
  <script type="text/babel" src="wheel.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
